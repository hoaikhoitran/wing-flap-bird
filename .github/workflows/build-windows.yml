name: Build Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11 x64
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: x64
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests (headless)
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: pytest tests -q

      - name: Build with PyInstaller
        run: >
          pyinstaller build/wing_flap_bird.spec --clean --noconfirm
          --workpath build_tmp --distpath dist

      - name: Smoke test executable (no camera, headless)
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: |
          dist/WingFlapBird/WingFlapBird.exe --smoke --no-camera
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Package release ZIP
        run: powershell -NoProfile -File scripts/package_release.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WingFlapBird-Windows-x64
          path: release/*.zip
          retention-days: 14
